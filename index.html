<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dora project | forsaken</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --primary-color: #ff4757;
            --text-color: #ffffff;
            --text-muted: #a4b0be;
            --border-color: #2f3542;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .section-box {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .section-box h2 {
            margin-top: 0;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            font-size: 1.5rem;
        }

        /* Form Nạp Thẻ */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group select, .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #2f3542;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .form-group select:focus, .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button.btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        button.btn-submit:hover {
            background-color: #ff6b81;
        }

        /* Danh mục sản phẩm */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #252525;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }

        .product-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
        }

        .product-info p {
            margin: 0;
            color: #2ed573;
            font-weight: bold;
        }

        .btn-buy {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-buy:hover {
            background-color: #26af5f;
        }
    </style>
</head>
<body>

    <header>
        <h1>Dora project | forsaken</h1>
        <p>Hệ thống nạp thẻ và mua tài khoản tự động</p>
    </header>

    <div class="main-container">
        
        <div class="section-box">
            <h2>Nạp Thẻ Cào</h2>
            <form id="card-form" onsubmit="handleCardSubmit(event)">
                <div class="form-group">
                    <label for="card-type">Chọn loại thẻ</label>
                    <select id="card-type" required>
                        <option value="Viettel">Viettel</option>
                        <option value="Mobi">Mobi</option>
                        <option value="Zing">Zing</option>
                        <option value="Garena">Garena</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="card-amount">Chọn mệnh giá</label>
                    <select id="card-amount" required>
                        <option value="10.000">10.000 VNĐ</option>
                        <option value="20.000">20.000 VNĐ</option>
                        <option value="50.000">50.000 VNĐ</option>
                        <option value="100.000">100.000 VNĐ</option>
                        <option value="200.000">200.000 VNĐ</option>
                        <option value="500.000">500.000 VNĐ</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="card-seri">Số Seri</label>
                    <input type="text" id="card-seri" placeholder="Nhập số seri thẻ" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="card-code">Mã thẻ</label>
                    <input type="text" id="card-code" placeholder="Nhập mã cào của thẻ" required autocomplete="off">
                </div>

                <button type="submit" class="btn-submit">Nạp Thẻ Ngay</button>
            </form>
        </div>

        <div class="section-box">
            <h2>Danh Mục Sản Phẩm</h2>
            <div class="product-list">
                
                <div class="product-item">
                    <div class="product-info">
                        <h3>Alt Account</h3>
                        <p>1.000 VNĐ</p>
                    </div>
                    <button class="btn-buy" onclick="buyProduct('Alt Account', '1.000')">Mua ngay</button>
                </div>

                <div class="product-item">
                    <div class="product-info">
                        <h3>Normal Account</h3>
                        <p>10.000 VNĐ</p>
                    </div>
                    <button class="btn-buy" onclick="buyProduct('Normal Account', '10.000')">Mua ngay</button>
                </div>

                <div class="product-item">
                    <div class="product-info">
                        <h3>Vip Account</h3>
                        <p>50.000 VNĐ</p>
                    </div>
                    <button class="btn-buy" onclick="buyProduct('Vip Account', '50.000')">Mua ngay</button>
                </div>

            </div>
        </div>

    </div>

    <script>
        // Xử lý khi bấm nút Nạp thẻ (Không check đúng sai, báo thành công luôn theo yêu cầu)
        function handleCardSubmit(event) {
            event.preventDefault(); // Ngăn trang bị reset khi bấm nút
            
            const type = document.getElementById('card-type').value;
            const amount = document.getElementById('card-amount').value;
            const seri = document.getElementById('card-seri').value;
            const code = document.getElementById('card-code').value;

            // Hiển thị thông báo nạp thành công kèm số tiền đã chọn
            alert(`[Dora project] Nạp thẻ thành công!\nLoại thẻ: ${type}\nMệnh giá: ${amount} VNĐ\nSeri: ${seri}\nMã thẻ: ${code}\nSố tiền đã được cộng vào tài khoản của bạn.`);
            
            // Reset lại form nhập thẻ sau khi nạp xong
            document.getElementById('card-form').reset();
        }

        // Xử lý khi bấm nút Mua tài khoản
        function buyProduct(productName, price) {
            alert(`Bạn đã chọn mua: ${productName}\nGiá: ${price} VNĐ\nVui lòng kiểm tra lại số dư hoặc kho đồ của bạn!`);
        }
    </script>

</body>
</html>

<div class="card">
<button onclick="daily()">+100K/ngày</button>
<button onclick="gift()">Nhập Giftcode</button>
</div>

<div class="card">
<h3>Nạp thẻ (DEMO)</h3>
<input id="seri" placeholder="Seri">
<input id="code" placeholder="Mã thẻ">
<button onclick="topup()">Nạp</button>
</div>

<div class="card">
<h3>Tài khoản Roblox mẫu</h3>
<div class="product">VIP - 50.000đ <button onclick="buy(50000,'VIP')">Mua</button></div>
<div class="product">Premium - 100.000đ <button onclick="buy(100000,'Premium')">Mua</button></div>
<div class="product">Checked - 200.000đ <button onclick="buy(200000,'Checked')">Mua</button></div>
</div>

<div class="card">
<h3>Lịch sử</h3>
<ul id="history"></ul>
</div>
</div>

<script>
function addHistory(t){
 let h=JSON.parse(localStorage.getItem("history")||"[]");
 h.unshift(t);
 localStorage.setItem("history",JSON.stringify(h));
 renderHistory();
}
function renderHistory(){
 let h=JSON.parse(localStorage.getItem("history")||"[]");
 document.getElementById("history").innerHTML=h.map(x=>"<li>"+x+"</li>").join("");
}
function register(){
 localStorage.setItem("user",ru.value);
 localStorage.setItem("pass",rp.value);
 alert("Đăng ký thành công");
}
function login(){
 if(lu.value===localStorage.getItem("user")&&lp.value===localStorage.getItem("pass")){
  auth.classList.add("hidden");
  shop.classList.remove("hidden");
  user.textContent=lu.value;
  balance.textContent=(localStorage.getItem("balance")||0);
  renderHistory();
 } else alert("Sai thông tin");
}
function daily(){
 let t=new Date().toDateString();
 if(localStorage.getItem("daily")==t){alert("Đã nhận hôm nay");return;}
 let b=Number(localStorage.getItem("balance")||0)+100000;
 localStorage.setItem("balance",b);
 localStorage.setItem("daily",t);
 balance.textContent=b;
 addHistory("+100K thưởng ngày");
}
function topup(){
 let b=Number(localStorage.getItem("balance")||0)+50000;
 localStorage.setItem("balance",b);
 balance.textContent=b;
 addHistory("Nạp thẻ demo +50K");
 alert("Nạp thành công (demo)");
}
function gift(){
 let c=prompt("Nhập giftcode");
 if(c==="DORA100"){
  let b=Number(localStorage.getItem("balance")||0)+100000;
  localStorage.setItem("balance",b);
  balance.textContent=b;
  addHistory("Giftcode DORA100 +100K");
 } else alert("Sai giftcode");
}
function buy(price,name){
 let b=Number(localStorage.getItem("balance")||0);
 if(b<price){alert("Không đủ tiền");return;}
 b-=price;
 localStorage.setItem("balance",b);
 balance.textContent=b;
 addHistory("Mua tài khoản "+name);
 alert("Mua thành công (demo)");
}
</script>
</body>
</html>
